app = "chef-control-backend"
primary_region = "ams"

[build]
  dockerfile = "Dockerfile"

[env]
  DEBUG       = "False"
  DB_DIR      = "/data"
  MEDIA_ROOT  = "/data/media"
  ALLOWED_HOSTS = "chef-control-backend.fly.dev"

[http_service]
  internal_port        = 8000
  force_https          = true
  auto_stop_machines   = "off"
  auto_start_machines  = true
  min_machines_running = 1

  [http_service.concurrency]
    type       = "connections"
    hard_limit = 100
    soft_limit = 80

[[vm]]
  cpu_kind  = "shared"
  cpus      = 1
  memory_mb = 256

[[mounts]]
  source      = "chef_data"
  destination = "/data"
  initial_size = "1gb"
